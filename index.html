<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>研究用スマホキーボード</title>

<style>
body{
  max-width:430px;
  margin:0 auto;
  font-family:system-ui, sans-serif;
  background:#f6f7fb;
}
#textArea{
  width:100%;
  height:120px;
  font-size:18px;
  padding:10px;
  box-sizing:border-box;
}
#canvasWrap{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:430px;
}
#canvas{
  position:relative;
  height:45vh;
  background:#eef3ff;
  border-radius:14px 14px 0 0;
  overflow:hidden;
  touch-action:none;
}
.key{
  position:absolute;
  background:white;
  border:1px solid #ccc;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  user-select:none;
}
.key.dragging{
  z-index:10;
}
</style>
</head>

<body>

<textarea id="textArea" placeholder="ここに日本語が入力されます"></textarea>

<div id="canvasWrap">
  <div id="canvas"></div>
</div>

<script>
/* ===== モード判定 ===== */
const params = new URLSearchParams(location.search);
const isEditMode = params.get("edit") === "1";

/* ===== ローマ字変換 ===== */
let romajiBuffer = "";
const ROMAJI = {
  a:"あ",i:"い",u:"う",e:"え",o:"お",
  ka:"か",ki:"き",ku:"く",ke:"け",ko:"こ",
  sa:"さ",shi:"し",su:"す",se:"せ",so:"そ",
  ta:"た",chi:"ち",tsu:"つ",te:"て",to:"と",
  na:"な",ni:"に",nu:"ぬ",ne:"ね",no:"の",
  ha:"は",hi:"ひ",fu:"ふ",he:"へ",ho:"ほ",
  ma:"ま",mi:"み",mu:"む",me:"め",mo:"も",
  ya:"や",yu:"ゆ",yo:"よ",
  ra:"ら",ri:"り",ru:"る",re:"れ",ro:"ろ",
  wa:"わ",n:"ん",
  ga:"が",gi:"ぎ",gu:"ぐ",ge:"げ",go:"ご"
};

/* ===== 初期キー配置（不要キー除外済み） ===== */
const KEYS = [
 ["w","e","r","t","y","u","i","o","p"],
 ["a","s","d","g","h","k"],
 ["z","b","n","m"],
 ["space","back"]
];

const canvas = document.getElementById("canvas");
const textArea = document.getElementById("textArea");

/* ===== キー作成 ===== */
function createKey(label,x,y,w=50,h=50){
  const el = document.createElement("div");
  el.className = "key";
  el.textContent = label==="space"?"␣":label==="back"?"⌫":label;
  el.style.left=x+"px";
  el.style.top=y+"px";
  el.style.width=w+"px";
  el.style.height=h+"px";
  canvas.appendChild(el);

  if(isEditMode){
    enableDrag(el);
  }

  el.addEventListener("click",()=>{
    handleInput(label);
  });
}

/* ===== 入力処理 ===== */
function handleInput(key){
  if(key==="back"){
    textArea.value=textArea.value.slice(0,-1);
    romajiBuffer="";
    return;
  }
  if(key==="space"){
    textArea.value+=" ";
    romajiBuffer="";
    return;
  }

  romajiBuffer+=key;

  for(let l=3;l>=1;l--){
    const part=romajiBuffer.slice(-l);
    if(ROMAJI[part]){
      textArea.value+=ROMAJI[part];
      romajiBuffer="";
      break;
    }
  }
}

/* ===== ドラッグ（編集モードのみ） ===== */
function enableDrag(el){
  let offsetX, offsetY;
  el.addEventListener("pointerdown",e=>{
    el.classList.add("dragging");
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;
    el.setPointerCapture(e.pointerId);

    el.onpointermove = ev=>{
      el.style.left = (ev.clientX-offsetX)+"px";
      el.style.top  = (ev.clientY-offsetY)+"px";
    };

    el.onpointerup = ()=>{
      el.classList.remove("dragging");
      el.onpointermove=null;
    };
  });
}

/* ===== 初期配置 ===== */
let y=10;
KEYS.forEach(row=>{
  let x=10;
  row.forEach(k=>{
    const w = k==="space"?200:50;
    createKey(k,x,y,w,50);
    x+=w+6;
  });
  y+=56;
});
</script>

</body>
</html>
